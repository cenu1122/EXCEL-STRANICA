<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Excel Tabela</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        
        /* Gornja traka sa komandama */
        .toolbar {
            background-color: #444;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between; /* Razmak između lijeve i desne strane */
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-group { display: flex; gap: 10px; }

        .btn {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }

        .btn:hover { background-color: white; color: #444; }

        /* Stilovi za Tabelu */
        table { border-collapse: collapse; background: white; table-layout: fixed; width: auto; }
        
        th, td { 
            border: 1px solid #ccc; 
            padding: 0; 
            position: relative;
            overflow: hidden;
            resize: both; /* Omogućava ručno širenje kolona i redova */
        }

        th { background-color: #eee; min-width: 60px; height: 40px; }

        /* Uske kolone za ID i Opcije */
        .col-id { width: 50px; font-weight: bold; resize: none; }
        .col-opc { width: 35px; color: #888; cursor: pointer; resize: none; font-size: 18px; }

        /* Sadržaj zaglavlja sa tačkama */
        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            height: 100%;
        }

        .dots-h { color: #999; cursor: pointer; font-weight: bold; }

        input { 
            width: 100%; 
            height: 100%; 
            border: none; 
            outline: none; 
            padding: 10px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
        }

        /* Drška za resize (donji desni ugao) */
        th::-webkit-resizer, td::-webkit-resizer {
            border: 5px solid transparent;
            border-right-color: #aaa;
            border-bottom-color: #aaa;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="btn-group">
        <button class="btn" onclick="addRow()">+ NOVI RED</button>
        <button class="btn" onclick="addColumn()">+ NOVA KOLONA</button>
    </div>

    <div class="btn-group">
        <button class="btn" style="border-color: #217346;" onclick="exportExcel()">EXCEL</button>
        <button class="btn" style="border-color: #d32f2f;" onclick="exportPDF()">PDF</button>
    </div>
</div>

<table id="mainTable">
    <thead>
        <tr id="header-row">
            <th class="col-id">ID</th>
            <th class="col-opc">...</th>
            <th style="width: 200px;">
                <div class="header-content"><span>A</span><span class="dots-h">...</span></div>
            </th>
            <th style="width: 200px;">
                <div class="header-content"><span>B</span><span class="dots-h">...</span></div>
            </th>
            <th style="width: 200px;">
                <div class="header-content"><span>C</span><span class="dots-h">...</span></div>
            </th>
        </tr>
    </thead>
    <tbody id="table-body">
        </tbody>
</table>

<script>
    let rowCount = 10; 
    let colCount = 3;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';
        for (let i = 1; i <= rowCount; i++) {
            const tr = document.createElement('tr');
            let rowHTML = `<td class="col-id">${i}</td><td class="col-opc">...</td>`;
            for (let j = 0; j < colCount; j++) {
                rowHTML += `<td><input type="text"></td>`;
            }
            tr.innerHTML = rowHTML;
            tbody.appendChild(tr);
        }
    }

    function addRow() { rowCount++; renderTable(); }

    function addColumn() {
        if(colCount < 26) {
            const hr = document.getElementById('header-row');
            const th = document.createElement('th');
            th.style.width = "200px";
            th.innerHTML = `<div class="header-content"><span>${letters[colCount]}</span><span class="dots-h">...</span></div>`;
            hr.appendChild(th);
            colCount++;
            renderTable();
        }
    }

    function exportExcel() { alert("Generišem Excel fajl..."); }
    function exportPDF() { alert("Generišem PDF dokument..."); }

    renderTable();
</script>

</body>
</html>
