<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8">
<title>Excel ULTRA PRO</title>

<style>
body{font-family:sans-serif;margin:0;background:#f0f0f0}
.toolbar{background:#217346;color:white;padding:10px;display:flex;gap:10px}
button{padding:6px 12px;border:0;background:white;color:#217346;font-weight:bold}

#table-container{height:90vh;overflow:auto;padding:10px}

table{border-collapse:collapse;background:white;user-select:none}
td,th{border:1px solid #ccc;min-width:80px;height:25px;text-align:center}

th{background:#e2e2e2;position:sticky;top:0}
.row-idx{background:#e2e2e2;position:sticky;left:0}

td.selected, th.selected{background:#a5d6a7 !important}
</style>
</head>

<body>

<div class="toolbar">
<button onclick="addRow()">+ Red</button>
<button onclick="addCol()">+ Kolona</button>
</div>

<div id="table-container">
<table>
<thead><tr id="header"></tr></thead>
<tbody id="body"></tbody>
</table>
</div>

<script>

let rows=30, cols=10;

let selected=[];
let isSelecting=false;

let anchorCell=null;

function clearSel(){
    selected.forEach(c=>c.classList.remove("selected"));
    selected=[];
}

function selectRange(a,b){
    clearSel();

    let body=document.getElementById("body");

    let r1=Math.min(a.parentElement.rowIndex,b.parentElement.rowIndex);
    let r2=Math.max(a.parentElement.rowIndex,b.parentElement.rowIndex);

    let c1=Math.min(a.cellIndex,b.cellIndex);
    let c2=Math.max(a.cellIndex,b.cellIndex);

    for(let r=r1;r<=r2;r++){
        for(let c=c1;c<=c2;c++){
            let cell=body.rows[r].cells[c];
            cell.classList.add("selected");
            selected.push(cell);
        }
    }
}

function build(){

let h=document.getElementById("header");
let b=document.getElementById("body");

h.innerHTML='<th class="row-idx"></th>';

for(let j=0;j<cols;j++){
    let th=document.createElement("th");
    th.innerText=String.fromCharCode(65+j);

    th.onclick=()=>{
        clearSel();
        let rowsEl=b.rows;
        for(let i=0;i<rowsEl.length;i++){
            let cell=rowsEl[i].cells[j+1];
            cell.classList.add("selected");
            selected.push(cell);
        }
    };

    h.appendChild(th);
}

b.innerHTML="";

for(let i=0;i<rows;i++){
let tr=document.createElement("tr");

let idx=document.createElement("td");
idx.className="row-idx";
idx.innerText=i+1;

idx.onclick=()=>{
    clearSel();
    for(let c=1;c<tr.cells.length;c++){
        tr.cells[c].classList.add("selected");
        selected.push(tr.cells[c]);
    }
};

tr.appendChild(idx);

for(let j=0;j<cols;j++){
let td=document.createElement("td");
td.contentEditable=true;

td.onmousedown=(e)=>{
    isSelecting=true;

    if(!e.shiftKey){
        anchorCell=td;
        clearSel();
    }

    selectRange(anchorCell, td);
};

td.onmouseover=()=>{
    if(!isSelecting) return;
    selectRange(anchorCell, td);
};

tr.appendChild(td);
}

b.appendChild(tr);
}

document.onmouseup=()=>isSelecting=false;

document.onkeydown=(e)=>{
if(selected.length==0) return;

let b=document.getElementById("body");

let minR=Math.min(...selected.map(x=>x.parentElement.rowIndex));
let maxR=Math.max(...selected.map(x=>x.parentElement.rowIndex));
let minC=Math.min(...selected.map(x=>x.cellIndex));
let maxC=Math.max(...selected.map(x=>x.cellIndex));

function txt(){
let t="";
for(let r=minR;r<=maxR;r++){
let line=[];
for(let c=minC;c<=maxC;c++){
line.push(b.rows[r].cells[c].innerText);
}
t+=line.join("\t")+"\n";
}
return t;
}

if(e.ctrlKey && e.key=="c"){
navigator.clipboard.writeText(txt());
}

if(e.ctrlKey && e.key=="x"){
navigator.clipboard.writeText(txt());
selected.forEach(x=>x.innerText="");
}
};

document.onpaste=(e)=>{
let text=e.clipboardData.getData("text/plain");
let lines=text.split("\n");

let b=document.getElementById("body");

let start=selected[0] || b.rows[0].cells[0];

let r0=start.parentElement.rowIndex;
let c0=start.cellIndex;

lines.forEach((line,i)=>{
let cols=line.split("\t");
cols.forEach((v,j)=>{
let cell=b.rows[r0+i]?.cells[c0+j];
if(cell) cell.innerText=v;
});
});
};

function addRow(){rows++;build();}
function addCol(){cols++;build();}

build();

</script>

</body>
</html>
