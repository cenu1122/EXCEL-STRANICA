<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Excel Baza</title>
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f7f6; }
        .toolbar { 
            margin-bottom: 20px; padding: 15px; background: white; 
            border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
        }
        button { 
            padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; 
            font-weight: bold; transition: 0.2s;
        }
        .btn-add { background: #217346; color: white; }
        .btn-save { background: #0078d4; color: white; }
        .btn-open { background: #ff9800; color: white; }
        .btn-clear { background: #555; color: white; }
        
        table { border-collapse: collapse; width: 100%; background: white; }
        th, td { border: 1px solid #ccc; padding: 12px; outline: none; }
        th { background: #f8f9fa; text-align: left; }
        td:focus { background: #f0f7ff; box-shadow: inset 0 0 0 2px #217346; }
        
        .status { font-size: 13px; color: #666; }
        #fileInput { display: none; } /* Sakriven input za otvaranje fajlova */
    </style>
</head>
<body>

    <div class="toolbar">
        <button class="btn-add" onclick="addRow()">➕ Dodaj red</button>
        <button class="btn-save" onclick="snimiKaoFajl()">💾 Snimi kao FAJL</button>
        
        <button class="btn-open" onclick="document.getElementById('fileInput').click()">📂 Otvori FAJL</button>
        <input type="file" id="fileInput" accept=".json" onchange="otvoriFajl(event)">
        
        <button class="btn-clear" onclick="obrisiSve()">🧹 Resetuj tabelu</button>
        <span class="status" id="status-text">Spremno.</span>
    </div>

    <table id="myTable">
        <thead>
            <tr>
                <th style="width: 50px;">ID</th>
                <th>Naziv Stavke</th>
                <th style="width: 200px;">Vrijednost (KM)</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
        <tfoot>
            <tr style="background: #eee; font-weight: bold;">
                <td colspan="2" style="text-align: right;">UKUPNO:</td>
                <td id="ukupno-polje">0.00</td>
            </tr>
        </tfoot>
    </table>

    <script>
        // --- 1. SNIMANJE NA KOMPJUTER ---
        function snimiKaoFajl() {
            let podaci = pokupiPodatkeIzTabele();
            let blob = new Blob([JSON.stringify(podaci, null, 2)], {type: "application/json"});
            
            // Traži od korisnika ime fajla
            let imeFajla = prompt("Unesite ime fajla:", "tabela_podaci");
            if (!imeFajla) return;

            let a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = imeFajla + ".json";
            a.click();
            
            prikaziStatus("Fajl snimljen!");
        }

        // --- 2. OTVARANJE FAJLA SA KOMPJUTERA ---
        function otvoriFajl(event) {
            let file = event.target.files[0];
            if (!file) return;

            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let podaci = JSON.parse(e.target.result);
                    popuniTabelu(podaci);
                    sacuvajULocalStorage(); // Zapamti ovaj učitani fajl i za F5
                    prikaziStatus("Fajl učitan!");
                } catch (err) {
                    alert("Greška pri čitanju fajla!");
                }
            };
            reader.readAsText(file);
        }

        // --- POMOĆNE FUNKCIJE ---

        function pokupiPodatkeIzTabele() {
            let rows = [];
            document.querySelectorAll("#table-body tr").forEach(tr => {
                rows.push({
                    n: tr.cells[1].innerText,
                    v: tr.cells[2].innerText
                });
            });
            return rows;
        }

        function popuniTabelu(podaci) {
            let tbody = document.getElementById("table-body");
            tbody.innerHTML = "";
            podaci.forEach((item, index) => {
                let row = tbody.insertRow();
                row.innerHTML = `
                    <td style="text-align:center; color:#999;">${index + 1}</td>
                    <td contenteditable="true" oninput="autoSave()">${item.n}</td>
                    <td contenteditable="true" oninput="autoSave()">${item.v}</td>
                `;
            });
            izracunajSve();
        }

        function autoSave() {
            sacuvajULocalStorage();
            izracunajSve();
        }

        function sacuvajULocalStorage() {
            localStorage.setItem("zadnje_stanje", JSON.stringify(pokupiPodatkeIzTabele()));
        }

        function izracunajSve() {
            let suma = 0;
            document.querySelectorAll("#table-body tr").forEach(tr => {
                let val = tr.cells[2].innerText.replace(',', '.').trim();
                suma += parseFloat(val) || 0;
            });
            document.getElementById("ukupno-polje").innerText = suma.toFixed(2);
        }

        function addRow() {
            let tbody = document.getElementById("table-body");
            let row = tbody.insertRow();
            let id = tbody.rows.length;
            row.innerHTML = `
                <td style="text-align:center; color:#999;">${id}</td>
                <td contenteditable="true" oninput="autoSave()"></td>
                <td contenteditable="true" oninput="autoSave()">0.00</td>
            `;
            autoSave();
        }

        function obrisiSve() {
            if(confirm("Resetovati tabelu?")) {
                localStorage.removeItem("zadnje_stanje");
                location.reload();
            }
        }

        function prikaziStatus(tekst) {
            let s = document.getElementById("status-text");
            s.innerText = tekst;
            setTimeout(() => s.innerText = "Spremno.", 2000);
        }

        // Učitaj zadnje stanje kad se otvori stranica
        window.onload = () => {
            let proslo = localStorage.getItem("zadnje_stanje");
            if (proslo) popuniTabelu(JSON.parse(proslo));
            else addRow();
        };
    </script>
</body>
</html>
