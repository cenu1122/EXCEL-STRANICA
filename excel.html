<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Inžinjerski Excel FINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; }
        .toolbar { background: #217346; padding: 10px; display: flex; gap: 10px; position: sticky; top: 0; z-index: 100; color: white; align-items: center; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; background: white; color: #217346; }
        .grid { display: grid; background: #bbb; gap: 1px; margin: 10px; border: 1px solid #bbb; }
        .cell { background: white; padding: 8px; min-height: 30px; outline: none; font-size: 18px; text-align: center; }
        .header { background: #e2e2e2; font-weight: bold; color: #444; display: flex; align-items: center; justify-content: center; height: 35px; }
        .active-cell { border: 2px solid #217346 !important; background: #fffde7 !important; }
        .calculated { background: #e8f5e9; transition: background 0.5s; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="addRow()">+ Red</button>
    <button onclick="addCol()">+ Kolona</button>
    <button onclick="savePDF()" style="background: gold; color: black; margin-left: auto;">SAČUVAJ PDF</button>
    <span id="status" style="font-size: 14px; margin-left: 10px;">Status: Spreman</span>
</div>

<div id="pdf-area">
    <div class="grid" id="excelGrid"></div>
</div>

<script>
    let rows = 20;
    let cols = 8;
    let rawData = {}; // Čuva ono što si TI napisao (formulu)
    let displayResults = {}; // Čuva REZULTAT koji se vidi

    function render() {
        const grid = document.getElementById('excelGrid');
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `50px repeat(${cols}, 1fr)`;

        // Zaglavlje A, B, C...
        grid.appendChild(createDiv('', 'header'));
        for (let c = 0; c < cols; c++) {
            grid.appendChild(createDiv(String.fromCharCode(65 + c), 'header'));
        }

        // Pravljenje ćelija
        for (let r = 1; r <= rows; r++) {
            grid.appendChild(createDiv(r, 'header')); 
            for (let c = 0; c < cols; c++) {
                let id = String.fromCharCode(65 + c) + r;
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.contentEditable = true;
                cell.id = id;
                
                // Pokaži rezultat ako postoji
                cell.innerText = displayResults[id] || '';

                cell.onfocus = () => {
                    cell.classList.add('active-cell');
                    if (rawData[id]) cell.innerText = rawData[id];
                };

                cell.onblur = () => {
                    cell.classList.remove('active-cell');
                    rawData[id] = cell.innerText.trim();
                    runCalculations();
                };

                // Automatsko dodavanje adrese klikom
                cell.onmousedown = (e) => {
                    let active = document.activeElement;
                    if (active && active.innerText.startsWith('=') && active !== cell) {
                        e.preventDefault();
                        active.innerText += id;
                    }
                };

                // Enter taster završava unos
                cell.onkeydown = (e) => {
                    if (e.key === "Enter") {
                        e.preventDefault();
                        cell.blur();
                    }
                };

                grid.appendChild(cell);
            }
        }
    }

    function createDiv(text, cls) {
        let d = document.createElement('div');
        d.className = cls;
        d.innerText = text;
        return d;
    }

    function runCalculations() {
        // 1. Prvo pokupi sve fiksne brojeve
        for (let id in rawData) {
            if (!rawData[id].startsWith('=')) {
                displayResults[id] = rawData[id];
            }
        }

        // 2. Izračunaj sve formule
        for (let id in rawData) {
            let val = rawData[id];
            if (val.startsWith('=')) {
                try {
                    let formula = val.substring(1).toUpperCase();
                    // Zamijeni npr. "A1" sa brojem iz displayResults
                    let expression = formula.replace(/[A-Z][0-9]+/g, (match) => {
                        let num = parseFloat(displayResults[match]) || 0;
                        return num;
                    });
                    
                    // Izračunaj matematiku
                    let finalResult = eval(expression);
                    displayResults[id] = finalResult;
                    
                    // Mala vizuelna potvrda
                    document.getElementById(id).classList.add('calculated');
                    setTimeout(() => document.getElementById(id).classList.remove('calculated'), 500);
                    
                } catch (err) {
                    displayResults[id] = "#GREŠKA";
                }
            }
        }

        // 3. Ažuriraj sve ćelije koje trenutno ne diraš
        for (let id in displayResults) {
            let el = document.getElementById(id);
            if (el && el !== document.activeElement) {
                el.innerText = displayResults[id];
            }
        }
    }

    function addRow() { rows++; render(); runCalculations(); }
    function addCol() { cols++; render(); runCalculations(); }
    function savePDF() { html2pdf().from(document.getElementById('pdf-area')).save(); }

    render();
</script>
</body>
</html>
