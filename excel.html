<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Inžinjerski Excel v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e6e6e6; margin: 0; }
        .toolbar { background: #217346; padding: 10px; display: flex; gap: 10px; position: sticky; top: 0; z-index: 100; color: white; }
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; background: white; color: #217346; }
        .grid { display: grid; background: #bbb; gap: 1px; margin: 10px; border: 1px solid #bbb; }
        .cell { background: white; padding: 5px; min-height: 25px; outline: none; font-size: 14px; text-align: center; }
        .header { background: #f4f4f4; font-weight: bold; color: #666; display: flex; align-items: center; justify-content: center; }
        .active-cell { border: 2px solid #217346 !important; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="addRow()">+ Red</button>
    <button onclick="addCol()">+ Kolona</button>
    <button onclick="document.getElementById('imgInp').click()">📷 SLIKA</button>
    <button onclick="savePDF()" style="background: gold; color: black; margin-left: auto;">SAČUVAJ PDF</button>
    <input type="file" id="imgInp" hidden accept="image/*" onchange="putImage(event)">
    <span style="font-size: 12px; margin-left: 10px;">Kucaj npr. <b>=A1+B1</b></span>
</div>

<div id="pdf-area">
    <div class="grid" id="excelGrid"></div>
</div>

<script>
    let rows = 15;
    let cols = 6;
    let data = {}; // Ovdje čuvamo šta si UKUCAO (formulu)
    let results = {}; // Ovdje čuvamo REZULTAT

    function render() {
        const grid = document.getElementById('excelGrid');
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = `40px repeat(${cols}, 1fr)`;

        // Zaglavlja (A, B, C...)
        grid.appendChild(createDiv('', 'header'));
        for (let c = 0; c < cols; c++) {
            grid.appendChild(createDiv(String.fromCharCode(65 + c), 'header'));
        }

        // Redovi
        for (let r = 1; r <= rows; r++) {
            grid.appendChild(createDiv(r, 'header')); // Broj reda
            for (let c = 0; c < cols; c++) {
                let id = String.fromCharCode(65 + c) + r;
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.contentEditable = true;
                cell.id = id;
                
                // Prikaži formulu kad klikneš, rezultat kad izađeš
                cell.innerText = results[id] || '';
                
                cell.onfocus = () => { cell.innerText = data[id] || ''; cell.classList.add('active-cell'); };
                cell.onblur = () => { 
                    data[id] = cell.innerText; 
                    cell.classList.remove('active-cell');
                    calculate(); 
                };
                
                // Automatsko dopisivanje kad pišeš formulu
                cell.onmousedown = () => {
                    let active = document.activeElement;
                    if (active && active.innerText.startsWith('=') && active !== cell) {
                        active.innerText += id;
                        return false;
                    }
                };

                grid.appendChild(cell);
            }
        }
    }

    function createDiv(text, cls) {
        let d = document.createElement('div');
        d.className = cls;
        d.innerText = text;
        return d;
    }

    function calculate() {
        for (let id in data) {
            let val = data[id];
            if (val.startsWith('=')) {
                try {
                    let formula = val.substring(1).toUpperCase();
                    // Zamijeni A1 sa brojem iz results[A1]
                    let finalFormula = formula.replace(/[A-Z][0-9]+/g, (match) => {
                        return results[match] || 0;
                    });
                    results[id] = eval(finalFormula);
                } catch (e) { results[id] = "#GREŠKA"; }
            } else {
                results[id] = val; // Običan broj
            }
        }
        // Osvježi prikaz bez gubljenja fokusa
        for (let id in results) {
            let el = document.getElementById(id);
            if (el && el !== document.activeElement) el.innerText = results[id];
        }
    }

    function addRow() { rows++; render(); }
    function addCol() { cols++; render(); }
    function savePDF() { html2pdf().from(document.getElementById('pdf-area')).save(); }

    render();
</script>
</body>
</html>
