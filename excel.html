<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Pametni Web Excel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #e6e6e6; margin: 0; padding-bottom: 50px; }
        .toolbar { position: sticky; top: 0; background: #217346; padding: 10px; display: flex; gap: 10px; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        button { padding: 8px 15px; cursor: pointer; border-radius: 4px; border: none; font-weight: bold; background: white; color: #217346; }
        
        .spreadsheet { display: grid; grid-template-columns: 40px repeat(10, 1fr); background: #bbb; gap: 1px; border: 1px solid #bbb; margin: 20px; }
        .cell { background: white; padding: 5px; min-height: 25px; outline: none; font-size: 14px; overflow: hidden; }
        .header-cell { background: #f4f4f4; text-align: center; font-weight: bold; color: #666; cursor: default; }
        
        /* Stil za slike u ćelijama */
        .cell img { max-width: 100px; display: block; margin: 2px auto; }
        .selected { border: 2px solid #217346 !important; z-index: 5; }
    </style>
</head>
<body>

<div class="toolbar">
    <button onclick="addRow()">+ Dodaj Red</button>
    <button onclick="addCol()">+ Dodaj Kolonu</button>
    <button onclick="document.getElementById('imgInp').click()">📷 UBACI SLIKU</button>
    <button onclick="generatePDF()" style="margin-left: auto; background: gold;">SAČUVAJ KAO PDF</button>
    <input type="file" id="imgInp" hidden accept="image/*" onchange="putImage(event)">
</div>

<div id="pdf-area">
    <div class="spreadsheet" id="grid">
        <div class="header-cell"></div>
        <div class="header-cell">A</div><div class="header-cell">B</div><div class="header-cell">C</div>
        <div class="header-cell">D</div><div class="header-cell">E</div><div class="header-cell">F</div>
        <div class="header-cell">G</div><div class="header-cell">H</div><div class="header-cell">I</div>
        <div class="header-cell">J</div>

        </div>
</div>

<script>
    const grid = document.getElementById('grid');
    let rows = 15; 
    let cols = 10;
    let data = {}; // Ovdje čuvamo vrijednosti

    function createGrid() {
        grid.innerHTML = '';
        // Headeri (Slova)
        grid.style.gridTemplateColumns = `40px repeat(${cols}, 1fr)`;
        grid.appendChild(createDiv('', 'header-cell'));
        for (let i = 0; i < cols; i++) {
            grid.appendChild(createDiv(String.fromCharCode(65 + i), 'header-cell'));
        }

        // Podaci
        for (let r = 1; r <= rows; r++) {
            grid.appendChild(createDiv(r, 'header-cell')); // Broj reda
            for (let c = 0; c < cols; c++) {
                const id = String.fromCharCode(65 + c) + r;
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.contentEditable = true;
                cell.id = id;
                cell.onblur = () => updateCell(id, cell.innerText);
                cell.onfocus = () => { if(data[id]) cell.innerText = data[id]; };
                grid.appendChild(cell);
            }
        }
    }

    function createDiv(text, cls) {
        const div = document.createElement('div');
        div.className = cls;
        div.innerText = text;
        return div;
    }

    function updateCell(id, val) {
        data[id] = val;
        if (val.startsWith('=')) {
            try {
                // Jednostavno računanje npr =A1+B1
                let formula = val.substring(1).toUpperCase();
                for (let cellId in data) {
                    if (formula.includes(cellId)) {
                        formula = formula.replace(new RegExp(cellId, 'g'), data[cellId] || 0);
                    }
                }
                document.getElementById(id).innerText = eval(formula);
            } catch (e) { document.getElementById(id).innerText = "#GREŠKA"; }
        }
    }

    function addRow() { rows++; createGrid(); }
    function addCol() { cols++; createGrid(); }

    function putImage(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        const active = document.activeElement;
        if(active.className !== 'cell') return alert("Klikni na ćeliju prvo!");
        
        reader.onload = (ev) => {
            const img = document.createElement('img');
            img.src = ev.target.result;
            active.appendChild(img);
        };
        reader.readAsDataURL(file);
    }

    function generatePDF() {
        const el = document.getElementById('pdf-area');
        html2pdf().set({ margin: 5, filename: 'tabela.pdf', jsPDF: { orientation: 'landscape' } }).from(el).save();
    }

    createGrid(); // Pokreni pri učitavanju
</script>

</body>
</html>
