<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Inžinjerski Excel PRO v6</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; overflow: hidden; }
        .toolbar { background: #217346; color: white; padding: 10px; display: flex; gap: 10px; position: sticky; top: 0; z-index: 1000; }
        button { padding: 8px 15px; border: 0; border-radius: 4px; background: white; color: #217346; font-weight: bold; cursor: pointer; }
        #table-container { height: calc(100vh - 60px); overflow: auto; padding: 10px; }
        table { border-collapse: collapse; background: white; table-layout: fixed; width: max-content; }
        td, th { border: 1px solid #ccc; width: 120px; height: 30px; text-align: center; outline: none; font-size: 16px; }
        th, .row-idx { background: #e2e2e2; user-select: none; cursor: pointer; }
        th { position: sticky; top: 0; z-index: 10; }
        .row-idx { position: sticky; left: 0; z-index: 5; font-weight: bold; width: 50px; }
        .selected { background: #c8e6c9 !important; }
        .active-cell { border: 2px solid #217346 !important; background: #fffde7 !important; }

        /* Stil za DESNI KLIK meni */
        #context-menu {
            position: absolute;
            background: white;
            border: 1px solid #ccc;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.2);
            display: none;
            z-index: 2000;
            width: 180px;
        }
        .menu-item {
            padding: 10px 15px;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }
        .menu-item:hover { background: #e8f5e9; color: #217346; }
        .menu-sep { border-bottom: 1px solid #eee; margin: 5px 0; }
    </style>
</head>
<body onclick="hideMenu()">

<div class="toolbar">
    <button onclick="addRow()">+ Red</button>
    <button onclick="addCol()">+ Kolona</button>
    <button onclick="savePDF()" style="background: gold; color: black; margin-left: auto;">SAČUVAJ PDF</button>
</div>

<div id="context-menu">
    <div class="menu-item" onclick="addRowAt()">Dodaj red ispod</div>
    <div class="menu-item" onclick="deleteRow()">Obriši ovaj red</div>
    <div class="menu-sep"></div>
    <div class="menu-item" onclick="addColAt()">Dodaj kolonu desno</div>
    <div class="menu-item" onclick="deleteCol()">Obriši ovu kolonu</div>
    <div class="menu-sep"></div>
    <div class="menu-item" onclick="clearContent()">Očisti sadržaj</div>
</div>

<div id="table-container">
    <table id="excelTable">
        <thead><tr id="header"></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
let rows = 100, cols = 15;
let dataStore = {}; 
let results = {};
let rightClickedCell = null;

function build() {
    const h = document.getElementById("header");
    const b = document.getElementById("body");
    h.innerHTML = '<th class="row-idx">ID</th>';
    for(let j=0; j<cols; j++) {
        let th = document.createElement("th");
        th.innerText = String.fromCharCode(65 + j);
        th.onclick = () => selectColumn(j + 1);
        h.appendChild(th);
    }
    b.innerHTML = "";
    for(let i=1; i<=rows; i++) {
        let tr = document.createElement("tr");
        let idxTd = document.createElement("td");
        idxTd.className = "row-idx";
        idxTd.innerText = i;
        idxTd.onclick = () => selectRow(i - 1);
        tr.appendChild(idxTd);

        for(let j=0; j<cols; j++) {
            let id = String.fromCharCode(65 + j) + i;
            let td = document.createElement("td");
            td.contentEditable = true;
            td.id = id;
            td.innerText = results[id] || "";

            td.oncontextmenu = (e) => {
                e.preventDefault();
                showMenu(e.pageX, e.pageY, td);
            };

            td.onfocus = () => { td.classList.add("active-cell"); if(dataStore[id]) td.innerText = dataStore[id]; };
            td.onblur = () => { td.classList.remove("active-cell"); dataStore[id] = td.innerText; calculate(); };

            td.onkeydown = (e) => {
                let r = tr.rowIndex - 1, c = td.cellIndex;
                if (e.key === "ArrowUp") { e.preventDefault(); moveFocus(r - 1, c); }
                else if (e.key === "ArrowDown") { e.preventDefault(); moveFocus(r + 1, c); }
                else if (e.key === "ArrowLeft" && window.getSelection().anchorOffset === 0) { e.preventDefault(); moveFocus(r, c - 1); }
                else if (e.key === "ArrowRight" && window.getSelection().anchorOffset === td.innerText.length) { e.preventDefault(); moveFocus(r, c + 1); }
                else if (e.key === "Enter") { e.preventDefault(); td.blur(); moveFocus(r + 1, c); }
            };
            tr.appendChild(td);
        }
        b.appendChild(tr);
    }
}

function showMenu(x, y, cell) {
    const menu = document.getElementById("context-menu");
    menu.style.display = "block";
    menu.style.left = x + "px";
    menu.style.top = y + "px";
    rightClickedCell = cell;
}

function hideMenu() { document.getElementById("context-menu").style.display = "none"; }

function moveFocus(r, c) {
    let table = document.getElementById("excelTable");
    if (r >= 0 && r < rows && c >= 1 && c <= cols) table.rows[r+1].cells[c].focus();
}

function selectRow(idx) { clearSelection(); let rowCells = document.getElementById("body").rows[idx].cells; for(let i=1; i < rowCells.length; i++) rowCells[i].classList.add("selected"); }
function selectColumn(idx) { clearSelection(); let bodyRows = document.getElementById("body").rows; for(let i=0; i < bodyRows.length; i++) bodyRows[i].cells[idx].classList.add("selected"); }
function clearSelection() { document.querySelectorAll('.selected').forEach(el => el.classList.remove('selected')); }

// OPCIJE MENIJA
function addRowAt() { rows++; build(); calculate(); }
function deleteRow() { if(rightClickedCell) { rightClickedCell.parentElement.remove(); rows--; } }
function clearContent() { if(rightClickedCell) { rightClickedCell.innerText = ""; dataStore[rightClickedCell.id] = ""; calculate(); } }
function addColAt() { cols++; build(); calculate(); }
function deleteCol() { alert("Za brisanje kolone koristite 'Obriši kolonu' opciju u punoj verziji."); }

function calculate() {
    for(let id in dataStore) { if(!dataStore[id].startsWith('=')) results[id] = dataStore[id]; }
    for(let id in dataStore) {
        let val = dataStore[id];
        if(val.startsWith('=')) {
            try {
                let formula = val.substring(1).toUpperCase();
                let processed = formula.replace(/[A-Z][0-9]+/g, (match) => results[match] || 0);
                results[id] = eval(processed);
            } catch(e) { results[id] = "#ERR"; }
        }
    }
    for(let id in results) { let el = document.getElementById(id); if(el && el !== document.activeElement) el.innerText = results[id]; }
}

function addRow() { rows++; build(); calculate(); }
function addCol() { cols++; build(); calculate(); }
function savePDF() { html2pdf().from(document.getElementById('table-container')).save(); }

build();
</script>
</body>
</html>
