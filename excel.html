<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Excel Tabela - Razdvojene Tačkice</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        
        .toolbar {
            background-color: #444;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }

        table { border-collapse: collapse; background: white; table-layout: fixed; width: auto; }
        
        th, td { border: 1px solid #ccc; padding: 0; overflow: hidden; }

        /* SMANJENE KOLONE ZA ID I OPCIJE */
        .col-id { width: 50px; font-weight: bold; background: #eee; text-align: center; }
        .col-opc { width: 35px; color: #888; cursor: pointer; text-align: center; background: #fff; }

        /* KONTROLA VISINE I ŠIRINE */
        th { background-color: #eee; min-width: 80px; resize: both; height: 60px; }
        td { resize: both; height: 35px; }

        /* NOVI RED ZA TAČKICE UNUTAR TH */
        .header-box {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* POSEBNA ĆELIJA IZNAD SLOVA */
        .top-dots {
            height: 25px;
            background-color: #f9f9f9;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #aaa;
            font-size: 14px;
            cursor: pointer;
        }
        .top-dots:hover { background-color: #e2e2e2; color: #333; }

        .bottom-letter {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
        }

        input { 
            width: 100%; 
            height: 100%; 
            border: none; 
            outline: none; 
            text-align: center;
            font-size: 16px;
            background: transparent;
        }

        th::-webkit-resizer, td::-webkit-resizer {
            border: 5px solid transparent;
            border-right-color: #999;
            border-bottom-color: #999;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="btn-group">
        <button class="btn" onclick="addRow()">+ NOVI RED</button>
        <button class="btn" onclick="addColumn()">+ NOVA KOLONA</button>
    </div>
    <div class="btn-group">
        <button class="btn" style="border-color: #217346;" onclick="exportExcel()">EXCEL</button>
        <button class="btn" style="border-color: #d32f2f;" onclick="exportPDF()">PDF</button>
    </div>
</div>

<table id="mainTable">
    <thead>
        <tr id="header-row">
            <th class="col-id">ID</th>
            <th class="col-opc" onclick="allMenu()">...</th>
            </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
</table>

<script>
    let rowCount = 10; 
    let colCount = 4;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function renderTable() {
        const hr = document.getElementById('header-row');
        const tbody = document.getElementById('table-body');

        // Render zaglavlja: Tačkice su u 'top-dots', slovo je u 'bottom-letter'
        hr.innerHTML = '<th class="col-id">ID</th><th class="col-opc">...</th>';
        for (let j = 0; j < colCount; j++) {
            const th = document.createElement('th');
            th.style.width = "150px";
            th.innerHTML = `
                <div class="header-box">
                    <div class="top-dots" onclick="colMenu('${letters[j]}')">...</div>
                    <div class="bottom-letter">${letters[j]}</div>
                </div>`;
            hr.appendChild(th);
        }

        // Render redova
        tbody.innerHTML = '';
        for (let i = 1; i <= rowCount; i++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-id">${i}</td>
                <td class="col-opc" onclick="rowMenu(${i})">...</td>
                ${Array(colCount).fill('<td><input type="text"></td>').join('')}
            `;
            tbody.appendChild(tr);
        }
    }

    function colMenu(c) { alert("Opcije za kolonu " + c); }
    function rowMenu(r) { alert("Opcije za red " + r); }
    function allMenu() { alert("Glavni meni"); }

    function addRow() { rowCount++; renderTable(); }
    function addColumn() { if(colCount < 26) { colCount++; renderTable(); } }
    
    function exportExcel() { alert("Exporting to Excel..."); }
    function exportPDF() { alert("Exporting to PDF..."); }

    renderTable();
</script>

</body>
</html>
