<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Excel Stranica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .controls { margin-bottom: 15px; }
        button { 
            background: #555; color: white; border: 2px solid #333; 
            padding: 12px 20px; font-size: 18px; font-weight: bold; 
            cursor: pointer; margin-right: 5px; border-radius: 4px;
        }
        table { border-collapse: collapse; width: 100%; border: 2px solid #ccc; }
        .excel-header { background: #e2e2e2; text-align: center; font-weight: bold; }
        th, td { border: 1px solid #ccc; padding: 10px; font-size: 18px; }
        th { background: #f0f0f0; }
        .menu-dots { cursor: pointer; float: right; font-weight: bold; }
        #custom-menu {
            display: none; position: absolute; background: white; 
            border: 1px solid #000; box-shadow: 4px 4px 10px rgba(0,0,0,0.2); 
            z-index: 1000; min-width: 140px;
        }
        #custom-menu div { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        #custom-menu div:hover { background: #f0f0f0; }
        .total-row { background: #fff9c4; font-weight: bold; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="addRow()">➕ Dodaj Red</button>
        <button onclick="addCol()">➕ Dodaj Kolonu</button>
        <button onclick="exportToExcel()">📊 Excel</button>
        <button onclick="exportToPDF()">📄 PDF</button>
    </div>

    <table id="myTable">
        <thead>
            <tr class="excel-header" id="letters-row">
                <td></td><td>A</td><td>B</td><td>C</td><td></td>
            </tr>
            <tr>
                <th>ID</th>
                <th>Naziv Stavke <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>
                <th>Vrijednost (KM) <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>
                <th style="width:30px;"></th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr>
                <td>1</td>
                <td contenteditable="true" oninput="izracunajSve()">Stavka 1</td>
                <td contenteditable="true" oninput="izracunajSve()" class="vrijednost">100.00</td>
                <td><span class="menu-dots" onclick="prikaziMeni()">⋮</span></td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="2" style="text-align:right;">UKUPNO:</td>
                <td id="ukupnoPrikaz">100.00</td>
                <td></td>
            </tr>
        </tfoot>
    </table>

    <div id="custom-menu">
        <div onclick="akcija('Uredi')">📝 Uredi</div>
        <div onclick="akcija('Obriši')">🗑️ Obriši</div>
    </div>

    <script>
        // LOGIKA RAČUNANJA
        function izracunajSve() {
            let sum = 0;
            let cells = document.querySelectorAll('.vrijednost');
            cells.forEach(cell => {
                let val = parseFloat(cell.innerText.replace(',', '.')) || 0;
                sum += val;
            });
            document.getElementById('ukupnoPrikaz').innerText = sum.toFixed(2);
        }

        // MENI LOGIKA
        function prikaziMeni() {
            let menu = document.getElementById("custom-menu");
            let e = window.event;
            e.stopPropagation();
            menu.style.display = "block";
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";
        }

        window.onclick = function() { document.getElementById("custom-menu").style.display = "none"; }

        // DODAVANJE REDA
        function addRow() {
            let tbody = document.getElementById("tableBody");
            let row = tbody.insertRow();
            let rCount = tbody.rows.length;
            
            row.innerHTML = `
                <td>${rCount}</td>
                <td contenteditable="true" oninput="izracunajSve()"></td>
                <td contenteditable="true" oninput="izracunajSve()" class="vrijednost">0.00</td>
                <td><span class="menu-dots" onclick="prikaziMeni()">⋮</span></td>
            `;
            izracunajSve();
        }

        // DODAVANJE KOLONE
        function addCol() {
            let table = document.getElementById("myTable");
            let lettersRow = document.getElementById("letters-row");
            let nextLetter = String.fromCharCode(64 + lettersRow.cells.length - 1);
            
            lettersRow.insertCell(lettersRow.cells.length - 1).innerText = nextLetter;
            
            for (let i = 1; i < table.rows.length - 1; i++) {
                let row = table.rows[i];
                let cell = row.insertCell(row.cells.length - 1);
                if(i === 1) {
                    cell.outerHTML = `<th>Nova <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>`;
                } else {
                    cell.contentEditable = "true";
                }
            }
        }

        function exportToExcel() {
            let wb = XLSX.utils.table_to_book(document.getElementById("myTable"));
            XLSX.writeFile(wb, "tabela.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();
            doc.autoTable({ html: '#myTable' });
            doc.save("tabela.pdf");
        }
    </script>
</body>
</html>
