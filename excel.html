<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Excel Stranica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .toolbar { margin-bottom: 20px; }
        button { 
            background: #555; color: white; border: none; 
            padding: 15px 25px; font-size: 20px; font-weight: bold; 
            cursor: pointer; margin-right: 10px; border-radius: 4px;
        }
        table { border-collapse: collapse; width: 100%; border: 1px solid #ccc; }
        .header-letters { background: #e0e0e0; text-align: center; font-weight: bold; height: 40px; }
        th, td { border: 1px solid #ccc; padding: 12px; font-size: 18px; position: relative; min-width: 100px; }
        th { background: #fff; font-size: 22px; text-align: left; }
        .menu-dots { cursor: pointer; float: right; font-size: 22px; color: #888; margin-left: 10px; }

        /* Popravljen meni sa ikonama */
        #custom-menu {
            display: none; position: absolute; background: white; 
            border: 1px solid #000; box-shadow: 4px 4px 10px rgba(0,0,0,0.2); 
            z-index: 1000; min-width: 160px;
        }
        #custom-menu div { padding: 12px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 18px; }
        #custom-menu div:hover { background: #f0f0f0; }

        .total-row { background: #f5f5f5; font-weight: bold; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="addRow()">➕ Dodaj Red</button>
        <button onclick="addCol()">➕ Dodaj Kolonu</button>
        <button onclick="exportToExcel()">📊 Excel</button>
        <button onclick="exportToPDF()">📄 PDF</button>
    </div>

    <table id="myTable">
        <thead>
            <tr class="header-letters" id="letters-row">
                <td style="width: 80px;"></td><td>A</td><td>B</td><td>C</td><td style="width: 50px;">D</td><td></td>
            </tr>
            <tr>
                <th>ID <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>
                <th>Naziv Stavke <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>
                <th>Vrijednost (KM) <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>
                <th>Opis <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>
                <th><span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>
            </tr>
        </thead>
        <tbody id="table-body">
            <tr>
                <td>1 <span class="menu-dots" onclick="prikaziMeni()">⋮</span></td>
                <td contenteditable="true" oninput="izracunajSve()">Stavka 1</td>
                <td contenteditable="true" oninput="izracunajSve()" class="vrijednost">100.00</td>
                <td contenteditable="true">Detalji...</td>
                <td><span class="menu-dots" onclick="prikaziMeni()">⋮</span></td>
            </tr>
            <tr>
                <td>2 <span class="menu-dots" onclick="prikaziMeni()">⋮</span></td>
                <td contenteditable="true" oninput="izracunajSve()">Stavka 2</td>
                <td contenteditable="true" oninput="izracunajSve()" class="vrijednost">0.00</td>
                <td contenteditable="true"></td>
                <td><span class="menu-dots" onclick="prikaziMeni()">⋮</span></td>
            </tr>
        </tbody>
        <tfoot>
            <tr class="total-row">
                <td colspan="2" style="text-align: right;">UKUPNO (KM):</td>
                <td id="ukupno-polje" colspan="2">100.00</td>
                <td></td>
            </tr>
        </tfoot>
    </table>

    <div id="custom-menu">
        <div onclick="akcija('Uredi')">📝 Uredi</div>
        <div onclick="akcija('Kopiraj')">📋 Kopiraj</div>
        <div onclick="akcija('Obriši')" style="color: red;">🗑️ Obriši</div>
    </div>

    <script>
        function izracunajSve() {
            let suma = 0;
            document.querySelectorAll('.vrijednost').forEach(p => {
                let br = parseFloat(p.innerText.replace(',', '.')) || 0;
                suma += br;
            });
            document.getElementById('ukupno-polje').innerText = suma.toFixed(2);
        }

        function prikaziMeni() {
            let menu = document.getElementById("custom-menu");
            let e = window.event;
            e.stopPropagation();
            menu.style.display = "block";
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";
        }

        function akcija(tip) {
            if(tip === 'Obriši') alert('Obrisano!');
            document.getElementById("custom-menu").style.display = "none";
        }

        window.onclick = function() {
            document.getElementById("custom-menu").style.display = "none";
        }

        function addRow() {
            let tbody = document.getElementById("table-body");
            let rCount = tbody.rows.length + 1;
            let row = tbody.insertRow();
            
            // Dinamički dodajemo onoliko ćelija koliko ima kolona
            let colCount = document.getElementById("letters-row").cells.length;
            
            for(let i=0; i < colCount; i++) {
                let cell = row.insertCell(i);
                if(i === 0) cell.innerHTML = `${rCount} <span class="menu-dots" onclick="prikaziMeni()">⋮</span>`;
                else if(i === 2) { 
                    cell.className = "vrijednost"; 
                    cell.contentEditable = "true"; 
                    cell.oninput = izracunajSve; 
                    cell.innerText = "0.00"; 
                }
                else if(i === colCount - 1) cell.innerHTML = `<span class="menu-dots" onclick="prikaziMeni()">⋮</span>`;
                else cell.contentEditable = "true";
            }
            izracunajSve();
        }

        function addCol() {
            let lRow = document.getElementById("letters-row");
            let table = document.getElementById("myTable");
            let cIndex = lRow.cells.length - 1;
            
            lRow.insertCell(cIndex).innerText = String.fromCharCode(64 + cIndex);
            
            for (let i = 1; i < table.rows.length - 1; i++) {
                let cell = table.rows[i].insertCell(cIndex);
                if (i === 1) cell.outerHTML = `<th>Nova <span class="menu-dots" onclick="prikaziMeni()">⋮</span></th>`;
                else cell.contentEditable = "true";
            }
        }

        function exportToExcel() {
            XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("myTable")), "tabela.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();
            doc.autoTable({ html: '#myTable' });
            doc.save("tabela.pdf");
        }
    </script>
</body>
</html>
