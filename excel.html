<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Inžinjer - Excel Stranica</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; }
        
        /* Toolbar */
        .toolbar {
            background-color: #444;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
        }
        .btn-group { display: flex; gap: 20px; }
        .btn {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .title-right { margin-left: auto; font-size: 24px; font-weight: bold; letter-spacing: 2px; }

        /* Tabela stilovi */
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ccc; padding: 10px; text-align: center; font-size: 18px; }
        th { background-color: #eee; }

        /* 1. SMANJENA ŠIRINA KOLONE SA TRI TAČKICE */
        .col-opc { width: 35px; color: #888; cursor: pointer; }
        .col-id { width: 50px; font-weight: bold; }

        /* 2. TRI TAČKICE ZA A, B, C KOLONE */
        .header-cell {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .header-dots {
            position: absolute;
            right: 5px;
            color: #888;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="btn-group">
            <button class="btn">+ NOVI RED</button>
            <button class="btn">+ NOVA KOLONA</button>
        </div>
        <div class="title-right">INŽINJER</div>
    </div>

    <table>
        <thead>
            <tr>
                <th class="col-id">ID</th>
                <th class="col-opc">⋮</th>
                <th>
                    <div class="header-cell">A <span class="header-dots">⋮</span></div>
                </th>
                <th>
                    <div class="header-cell">B <span class="header-dots">⋮</span></div>
                </th>
                <th>
                    <div class="header-cell">C <span class="header-dots">⋮</span></div>
                </th>
                <th>
                    <div class="header-cell">D <span class="header-dots">⋮</span></div>
                </th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td class="col-id">1</td>
                <td class="col-opc">⋮</td>
                <td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td class="col-id">2</td>
                <td class="col-opc">⋮</td>
                <td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td class="col-id">3</td>
                <td class="col-opc">⋮</td>
                <td></td><td></td><td></td><td></td>
            </tr>
            <tr>
                <td class="col-id">4</td>
                <td class="col-opc">⋮</td>
                <td></td><td></td><td></td><td></td>
            </tr>
        </tbody>
    </table>

</body>
</html>
