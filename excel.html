<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Excel Stranica</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 20px; background-color: #f4f7f6; }
        .toolbar { margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
        
        button { 
            padding: 8px 15px; cursor: pointer; border: none; border-radius: 4px; 
            background-color: #217346; color: white; transition: 0.3s;
        }
        button:hover { background-color: #1a5a37; }
        button.secondary { background-color: #0078d4; }
        
        table { border-collapse: collapse; width: 100%; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; position: relative; }
        th { background-color: #f8f9fa; font-weight: 600; }
        
        tr:hover { background-color: #f1f1f1; }
        
        .menu-dots { 
            float: right; cursor: pointer; color: #888; padding: 0 5px; 
            font-weight: bold; font-size: 18px; 
        }

        /* Stil za naš novi prilagođeni meni */
        #custom-menu {
            display: none; position: absolute; background: #fff; 
            border: 1px solid #ccc; box-shadow: 2px 2px 10px rgba(0,0,0,0.2); 
            z-index: 1000; min-width: 130px; border-radius: 4px; overflow: hidden;
        }
        #custom-menu ul { list-style: none; margin: 0; padding: 0; }
        #custom-menu li { 
            padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 14px; 
        }
        #custom-menu li:hover { background-color: #f1f1f1; }
        #custom-menu li:last-child { border-bottom: none; color: red; }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="addRow()">➕ Dodaj Red</button>
        <button onclick="addCol()">➕ Dodaj Kolonu</button>
        <button class="secondary" onclick="exportToExcel()">📊 Export u Excel</button>
        <button class="secondary" onclick="exportToPDF()">📄 Export u PDF</button>
        <button style="background:#333;" onclick="allMenu()">⚙️ Glavni Meni</button>
    </div>

    <table id="myTable">
        <thead>
            <tr>
                <th>ID <span class="menu-dots" onclick="colMenu(1)">⋮</span></th>
                <th>Naziv Stavke <span class="menu-dots" onclick="colMenu(2)">⋮</span></th>
                <th>Vrijednost <span class="menu-dots" onclick="colMenu(3)">⋮</span></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td contenteditable="true">Primjer podataka</td>
                <td contenteditable="true">100.00</td>
                <td><span class="menu-dots" onclick="rowMenu(1)">⋮</span></td>
            </tr>
        </tbody>
    </table>

    <div id="custom-menu">
        <ul>
            <li onclick="izvrsiAkciju('Uredi')">📝 Uredi</li>
            <li onclick="izvrsiAkciju('Kopiraj')">📋 Kopiraj</li>
            <li onclick="izvrsiAkciju('Obriši')">🗑️ Obriši</li>
        </ul>
    </div>

    <script>
        // --- FUNKCIJE ZA MENI ---
        function colMenu(c) { prikaziMeni("Kolona " + c); }
        function rowMenu(r) { prikaziMeni("Red " + r); }
        function allMenu() { prikaziMeni("Glavni Meni"); }

        function prikaziMeni(info) {
            let menu = document.getElementById("custom-menu");
            let e = window.event;
            e.stopPropagation();
            
            menu.style.display = "block";
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";
            console.log("Akcija za: " + info);
        }

        function izvrsiAkciju(tip) {
            alert("Pokrenuli ste: " + tip);
            document.getElementById("custom-menu").style.display = "none";
        }

        window.onclick = function() {
            document.getElementById("custom-menu").style.display = "none";
        }

        // --- MANIPULACIJA TABELOM ---
        function addRow() {
            let table = document.getElementById("myTable").getElementsByTagName('tbody')[0];
            let newRow = table.insertRow();
            let rowCount = table.rows.length;
            
            for (let i = 0; i < 3; i++) {
                let cell = newRow.insertCell(i);
                cell.contentEditable = "true";
                cell.innerHTML = i === 0 ? rowCount : "-";
            }
            let actionCell = newRow.insertCell(3);
            actionCell.innerHTML = `<span class="menu-dots" onclick="rowMenu(${rowCount})">⋮</span>`;
        }

        function addCol() {
            let table = document.getElementById("myTable");
            let rowCount = table.rows.length;
            let colCount = table.rows[0].cells.length;

            for (let i = 0; i < rowCount; i++) {
                let cell = table.rows[i].insertCell(colCount - 1);
                if (i === 0) {
                    cell.outerHTML = `<th>Nova Kolona <span class="menu-dots" onclick="colMenu(${colCount})">⋮</span></th>`;
                } else {
                    cell.contentEditable = "true";
                    cell.innerHTML = "-";
                }
            }
        }

        // --- EXPORT FUNKCIJE ---
        function exportToExcel() {
            let table = document.getElementById("myTable");
            let wb = XLSX.utils.table_to_book(table);
            XLSX.writeFile(wb, "Izvjestaj.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();
            doc.text("Tabelarni Izvještaj", 14, 15);
            doc.autoTable({ html: '#myTable' });
            doc.save("Izvjestaj.pdf");
        }
    </script>
</body>
</html>
