<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Excel Tabela - Profi</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        
        .toolbar {
            background-color: #444;
            color: white;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 15px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
        }
        .btn:hover { background-color: white; color: #444; }

        table { border-collapse: collapse; background: white; table-layout: fixed; width: auto; }
        
        th, td { 
            border: 1px solid #ccc; 
            padding: 0; 
            position: relative;
            overflow: hidden;
        }

        /* 1. KONTROLA ŠIRINE I VISINE */
        th { background-color: #eee; min-width: 60px; resize: both; }
        td { resize: both; }

        .col-id { width: 50px; font-weight: bold; background: #eee; resize: none; text-align: center; }
        .col-opc { width: 35px; color: #888; cursor: pointer; resize: none; text-align: center; font-weight: bold; }

        /* 2. TAČKICE IZNAD SLOVA */
        .header-stack {
            display: flex;
            flex-direction: column;
            height: 100%;
        }
        .dots-row {
            height: 20px;
            font-size: 12px;
            color: #999;
            background: #f9f9f9;
            border-bottom: 1px solid #ddd;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dots-row:hover { background: #e0e0e0; color: #333; }
        .letter-row {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 18px;
        }

        input { 
            width: 100%; 
            height: 100%; 
            border: none; 
            outline: none; 
            padding: 5px;
            box-sizing: border-box;
            font-size: 16px;
            text-align: center;
            background: transparent;
        }

        /* Resizer drška */
        th::-webkit-resizer, td::-webkit-resizer {
            border: 5px solid transparent;
            border-right-color: #aaa;
            border-bottom-color: #aaa;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <div class="btn-group">
        <button class="btn" onclick="addRow()">+ NOVI RED</button>
        <button class="btn" onclick="addColumn()">+ NOVA KOLONA</button>
    </div>
    <div class="btn-group">
        <button class="btn" style="border-color: #217346;" onclick="exportExcel()">EXCEL</button>
        <button class="btn" style="border-color: #d32f2f;" onclick="exportPDF()">PDF</button>
    </div>
</div>

<table id="mainTable">
    <thead>
        <tr id="header-row">
            <th class="col-id" style="height: 60px;">ID</th>
            <th class="col-opc">...</th>
            </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
</table>

<script>
    let rowCount = 10; 
    let colCount = 4;
    const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

    function renderTable() {
        const hr = document.getElementById('header-row');
        const tbody = document.getElementById('table-body');

        // Render zaglavlja sa tačkicama IZNAD slova
        hr.innerHTML = '<th class="col-id">ID</th><th class="col-opc" onclick="colMenu(\'ALL\')">...</th>';
        for (let j = 0; j < colCount; j++) {
            const th = document.createElement('th');
            th.style.width = "150px";
            th.innerHTML = `
                <div class="header-stack">
                    <div class="dots-row" onclick="colMenu('${letters[j]}')">...</div>
                    <div class="letter-row">${letters[j]}</div>
                </div>`;
            hr.appendChild(th);
        }

        // Render redova sa funkcionalnim tačkicama
        tbody.innerHTML = '';
        for (let i = 1; i <= rowCount; i++) {
            const tr = document.createElement('tr');
            
            // ID kolona i OPC kolona sa klikabilnim tačkama
            let rowHTML = `<td class="col-id">${i}</td>
                           <td class="col-opc" onclick="rowMenu(${i})">...</td>`;
            
            for (let j = 0; j < colCount; j++) {
                rowHTML += `<td><input type="text"></td>`;
            }
            tr.innerHTML = rowHTML;
            tbody.appendChild(tr);
        }
    }

    // Funkcije za menije (ovdje možeš dodati logiku za brisanje, sortiranje itd.)
    function colMenu(col) {
        alert("Opcije za kolonu " + col);
    }

    function rowMenu(row) {
        alert("Opcije za red " + row);
    }

    function addRow() { rowCount++; renderTable(); }
    function addColumn() { if(colCount < 26) { colCount++; renderTable(); } }

    function exportExcel() { alert("Izvoz u Excel..."); }
    function exportPDF() { alert("Izvoz u PDF..."); }

    renderTable();
</script>

</body>
</html>
