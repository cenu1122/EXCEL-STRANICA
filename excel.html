<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moja Excel Stranica</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        /* Tvoj originalni stil sa screenshota */
        body { font-family: sans-serif; }
        button { padding: 10px; margin: 5px; font-size: 16px; cursor: pointer; background: #555; color: white; border: none; }
        table { border-collapse: collapse; width: 100%; margin-top: 10px; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: left; }
        .menu-dots { cursor: pointer; float: right; }

        /* Samo dodajemo ovaj dio za meni koji si tražio */
        #custom-menu {
            display: none; position: absolute; background: white; 
            border: 1px solid #333; box-shadow: 3px 3px 10px rgba(0,0,0,0.3); 
            z-index: 9999; min-width: 120px;
        }
        #custom-menu div { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; }
        #custom-menu div:hover { background: #f0f0f0; }
    </style>
</head>
<body>

    <button onclick="addRow()">➕ Dodaj Red</button>
    <button onclick="addCol()">➕ Dodaj Kolonu</button>
    <button onclick="exportToExcel()">📊 Export u Excel</button>
    <button onclick="exportToPDF()">📄 Export u PDF</button>
    <button onclick="allMenu()">⚙️ Glavni Meni</button>

    <table id="myTable">
        <thead>
            <tr>
                <th>ID <span class="menu-dots" onclick="colMenu(1)">⋮</span></th>
                <th>Naziv Stavke <span class="menu-dots" onclick="colMenu(2)">⋮</span></th>
                <th>Vrijednost <span class="menu-dots" onclick="colMenu(3)">⋮</span></th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td contenteditable="true">Primjer podataka</td>
                <td contenteditable="true">100.00</td>
                <td><span class="menu-dots" onclick="rowMenu(1)">⋮</span></td>
            </tr>
        </tbody>
    </table>

    <div id="custom-menu">
        <div onclick="izvrsi('Uredi')">Uredi</div>
        <div onclick="izvrsi('Obriši')">Obriši</div>
        <div onclick="izvrsi('Kopiraj')">Kopiraj</div>
    </div>

    <script>
        // --- NOVE FUNKCIJE BEZ ALERTA ---
        function colMenu(c) { otvoriMeni(); }
        function rowMenu(r) { otvoriMeni(); }
        function allMenu() { otvoriMeni(); }

        function otvoriMeni() {
            let menu = document.getElementById("custom-menu");
            let e = window.event;
            e.stopPropagation();
            menu.style.display = "block";
            menu.style.left = e.pageX + "px";
            menu.style.top = e.pageY + "px";
        }

        function izvrsi(akcija) {
            console.log("Izabrano: " + akcija);
            document.getElementById("custom-menu").style.display = "none";
        }

        window.onclick = function() {
            document.getElementById("custom-menu").style.display = "none";
        }

        // --- TVOJE FUNKCIJE ZA TABELU ---
        function addRow() {
            let table = document.getElementById("myTable").getElementsByTagName('tbody')[0];
            let row = table.insertRow();
            row.innerHTML = '<td>'+(table.rows.length)+'</td><td contenteditable="true"></td><td contenteditable="true"></td><td><span class="menu-dots" onclick="rowMenu('+(table.rows.length)+')">⋮</span></td>';
        }

        function addCol() {
            let table = document.getElementById("myTable");
            for (let i = 0; i < table.rows.length; i++) {
                let cell = table.rows[i].insertCell(-1);
                cell.innerHTML = i === 0 ? 'Nova Kolona <span class="menu-dots" onclick="colMenu()">⋮</span>' : "";
                if(i > 0) cell.contentEditable = "true";
            }
        }

        function exportToExcel() {
            let wb = XLSX.utils.table_to_book(document.getElementById("myTable"));
            XLSX.writeFile(wb, "tabela.xlsx");
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            let doc = new jsPDF();
            doc.autoTable({ html: '#myTable' });
            doc.save("tabela.pdf");
        }
    </script>
</body>
</html>
