<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sigurni Excel - Čuvanje radi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 20px; background-color: #f4f4f9; }
        .toolbar { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { 
            background: #217346; color: white; border: none; 
            padding: 10px 15px; font-size: 16px; font-weight: bold; 
            cursor: pointer; margin-right: 10px; border-radius: 4px;
        }
        .save-btn { background: #0078d4; }
        .clear-btn { background: #555; }
        
        table { border-collapse: collapse; width: 100%; background: white; border: 1px solid #ccc; }
        .header-letters { background: #e0e0e0; text-align: center; }
        th, td { border: 1px solid #ccc; padding: 10px; outline: none; }
        td:focus { background: #f0f7ff; box-shadow: inset 0 0 0 2px #217346; }

        #status-poruka {
            position: fixed; top: 10px; right: 10px; background: #217346; color: white;
            padding: 10px; border-radius: 5px; display: none; z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="status-poruka">✅ Podaci sačuvani!</div>

    <div class="toolbar">
        <button onclick="addRow()">➕ Dodaj red</button>
        <button class="save-btn" onclick="saveToLocal()">💾 RUČNO SNIMI</button>
        <button onclick="exportToExcel()">📊 Excel</button>
        <button class="clear-btn" onclick="obrisiSve()">🧹 Obriši sve</button>
    </div>

    <table id="myTable">
        <thead>
            <tr class="header-letters">
                <td style="width: 50px;">ID</td>
                <td>Naziv Stavke (A)</td>
                <td style="width: 150px;">Vrijednost (B)</td>
            </tr>
        </thead>
        <tbody id="table-body">
            </tbody>
        <tfoot>
            <tr style="background: #eee; font-weight: bold;">
                <td colspan="2" style="text-align: right;">UKUPNO:</td>
                <td id="ukupno-polje">0.00</td>
            </tr>
        </tfoot>
    </table>

    <script>
        // Glavna funkcija za snimanje
        function saveToLocal() {
            const rows = [];
            const tableRows = document.querySelectorAll("#table-body tr");
            
            tableRows.forEach(tr => {
                rows.push({
                    naziv: tr.cells[1].innerText,
                    vrijednost: tr.cells[2].innerText
                });
            });

            localStorage.setItem("mojExcelData", JSON.stringify(rows));
            
            // Pokaži poruku da je snimljeno
            const status = document.getElementById("status-poruka");
            status.style.display = "block";
            setTimeout(() => { status.style.display = "none"; }, 1500);
            
            izracunajSve();
        }

        // Glavna funkcija za učitavanje
        function loadFromLocal() {
            const sacuvaniPodaci = localStorage.getItem("mojExcelData");
            const tbody = document.getElementById("table-body");
            tbody.innerHTML = "";

            if (sacuvaniPodaci) {
                const rows = JSON.parse(sacuvaniPodaci);
                rows.forEach((item, index) => {
                    unesiRedUTabelu(index + 1, item.naziv, item.vrijednost);
                });
            } else {
                unesiRedUTabelu(1, "", "0.00");
            }
            izracunajSve();
        }

        function unesiRedUTabelu(id, naziv, vrijednost) {
            const tbody = document.getElementById("table-body");
            const row = tbody.insertRow();
            row.innerHTML = `
                <td style="text-align:center; color:#888;">${id}</td>
                <td contenteditable="true" class="excel-cell" onblur="saveToLocal()">${naziv}</td>
                <td contenteditable="true" class="excel-cell vrijednost" onblur="saveToLocal()">${vrijednost}</td>
            `;
        }

        function addRow() {
            const id = document.querySelectorAll("#table-body tr").length + 1;
            unesiRedUTabelu(id, "", "0.00");
            saveToLocal();
        }

        function izracunajSve() {
            let suma = 0;
            document.querySelectorAll('.vrijednost').forEach(p => {
                let val = p.innerText.replace(',', '.').trim();
                suma += parseFloat(val) || 0;
            });
            document.getElementById('ukupno-polje').innerText = suma.toFixed(2);
        }

        function obrisiSve() {
            if(confirm("Brišeš sve iz memorije?")) {
                localStorage.removeItem("mojExcelData");
                location.reload();
            }
        }

        function exportToExcel() { 
            XLSX.writeFile(XLSX.utils.table_to_book(document.getElementById("myTable")), "izvjestaj.xlsx"); 
        }

        // Pokreni učitavanje čim se stranica otvori
        window.onload = loadFromLocal;

    </script>
</body>
</html>
