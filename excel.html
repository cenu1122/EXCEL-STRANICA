<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Inžinjerski Excel PRO v9</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; overflow: hidden; }
        .toolbar { background: #217346; color: white; padding: 10px; display: flex; gap: 10px; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        .btn { padding: 8px 15px; border: 0; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-excel { background: #ffffff; color: #217346; border: 2px solid #ffffff; }
        .btn-excel:hover { background: #e8f5e9; }
        .btn-pdf { background: #d32f2f; color: white; }
        .btn-add { background: #1565c0; color: white; }
        
        #table-container { height: calc(100vh - 70px); overflow: auto; padding: 10px; }
        table { border-collapse: collapse; background: white; table-layout: fixed; width: max-content; }
        td, th { border: 1px solid #ccc; width: 120px; height: 35px; text-align: center; outline: none; font-size: 15px; }
        th, .row-idx { background: #e2e2e2; user-select: none; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .row-idx { position: sticky; left: 0; z-index: 11; width: 50px; }
        
        /* Dugme za opcije unutar tabele */
        .opt-trigger { width: 30px !important; background: #f5f5f5; cursor: pointer; color: #666; font-size: 18px; }
        .opt-trigger:hover { background: #e0e0e0; color: #000; }
        
        .active-cell { border: 2px solid #217346 !important; background: #fffde7 !important; }

        /* Meni koji se otvara na klik dugmeta */
        #action-menu {
            position: fixed; display: none; background: white; border: 1px solid #999;
            box-shadow: 3px 3px 15px rgba(0,0,0,0.3); z-index: 10000; width: 180px; border-radius: 5px;
        }
        .menu-item { padding: 12px 15px; cursor: pointer; font-size: 14px; border-bottom: 1px solid #eee; }
        .menu-item:hover { background: #217346; color: white; }
        .menu-item:last-child { border-bottom: none; }
    </style>
</head>
<body onclick="hideMenu()">

<div class="toolbar">
    <button class="btn btn-add" onclick="addRow()">+ NOVI RED</button>
    <button class="btn btn-add" onclick="addCol()">+ NOVA KOLONA</button>
    <div style="flex-grow: 1; text-align: center; font-weight: bold;">INŽINJERSKI EXCEL</div>
    <button class="btn btn-excel" onclick="saveAsExcel()">💾 SNIMI U EXCEL (.xlsx)</button>
    <button class="btn btn-pdf" onclick="saveAsPDF()">📄 SNIMI U PDF</button>
</div>

<div id="action-menu">
    <div class="menu-item" onclick="insertRow()">Ubaci red ispod</div>
    <div class="menu-item" onclick="deleteRow()">Obriši ovaj red</div>
    <div class="menu-item" onclick="clearRow()">Isprazni red</div>
</div>

<div id="table-container">
    <table id="excelTable">
        <thead><tr id="header"></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
let rows = 100, cols = 15;
let targetRowIndex = null;

function build() {
    const h = document.getElementById("header");
    const b = document.getElementById("body");
    
    // Zaglavlje
    h.innerHTML = '<th class="row-idx">ID</th><th class="row-idx">OPC.</th>';
    for(let j=0; j<cols; j++) {
        let th = document.createElement("th");
        th.innerText = String.fromCharCode(65 + j);
        h.appendChild(th);
    }

    // Redovi
    b.innerHTML = "";
    for(let i=1; i<=rows; i++) {
        let tr = document.createElement("tr");
        
        // Broj reda
        let idxTd = document.createElement("td");
        idxTd.className = "row-idx";
        idxTd.innerText = i;
        tr.appendChild(idxTd);

        // DUGME ZA OPCIJE (Zamjena za desni klik)
        let optTd = document.createElement("td");
        optTd.className = "opt-trigger";
        optTd.innerHTML = "⋮";
        optTd.onclick = (e) => {
            e.stopPropagation();
            showMenu(e.clientX, e.clientY, tr.rowIndex - 1);
        };
        tr.appendChild(optTd);

        for(let j=0; j<cols; j++) {
            let td = document.createElement("td");
            td.contentEditable = true;
            td.onfocus = () => td.classList.add("active-cell");
            td.onblur = () => td.classList.remove("active-cell");
            
            // Navigacija strelicama
            td.onkeydown = (e) => {
                let r = tr.rowIndex - 1, c = td.cellIndex;
                if (e.key === "ArrowUp") { e.preventDefault(); moveFocus(r - 1, c); }
                if (e.key === "ArrowDown") { e.preventDefault(); moveFocus(r + 1, c); }
                if (e.key === "ArrowLeft" && window.getSelection().anchorOffset === 0) { e.preventDefault(); moveFocus(r, c - 1); }
                if (e.key === "ArrowRight" && window.getSelection().anchorOffset === td.innerText.length) { e.preventDefault(); moveFocus(r, c + 1); }
            };
            tr.appendChild(td);
        }
        b.appendChild(tr);
    }
}

function showMenu(x, y, rowIndex) {
    let menu = document.getElementById("action-menu");
    menu.style.display = "block";
    menu.style.left = x + "px";
    menu.style.top = y + "px";
    targetRowIndex = rowIndex;
}

function hideMenu() { document.getElementById("action-menu").style.display = "none"; }

function moveFocus(r, c) {
    let table = document.getElementById("excelTable");
    if (r >= 0 && r < rows && c >= 2) {
        let target = table.rows[r+1].cells[c];
        if(target) target.focus();
    }
}

// Funkcije menija
function insertRow() { rows++; build(); hideMenu(); }
function deleteRow() { 
    if(targetRowIndex !== null) {
        document.getElementById("excelTable").deleteRow(targetRowIndex + 1);
        rows--;
    }
    hideMenu(); 
}
function clearRow() {
    let row = document.getElementById("excelTable").rows[targetRowIndex + 1];
    for(let i=2; i<row.cells.length; i++) row.cells[i].innerText = "";
    hideMenu();
}

// ČUVANJE
function saveAsExcel() {
    let table = document.getElementById("excelTable");
    // Brišemo kolonu sa dugmićima iz izvoza da ne smeta u Excelu
    let wb = XLSX.utils.table_to_book(table);
    XLSX.writeFile(wb, "Inzinjerski_Proracun.xlsx");
}

function saveAsPDF() {
    const element = document.getElementById('table-container');
    html2pdf().from(element).set({
        margin: 5,
        filename: 'Proracun.pdf',
        jsPDF: { orientation: 'landscape' }
    }).save();
}

function addRow() { rows++; build(); }
function addCol() { cols++; build(); }

build();
</script>
</body>
</html>
