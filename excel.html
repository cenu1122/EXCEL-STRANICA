<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Inžinjer - Fleksibilna Tabela</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        
        .toolbar {
            background-color: #444;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .title { margin-left: auto; font-size: 24px; font-weight: bold; }

        /* TABELA */
        table { border-collapse: collapse; background: white; table-layout: fixed; width: auto; }
        
        /* 1. KONTROLA ŠIRINE I VISINE (RESIZE) */
        th, td { 
            border: 1px solid #ccc; 
            padding: 5px; 
            text-align: center; 
            overflow: hidden;
            resize: both; /* Omogućava razvlačenje i širine i visine */
        }

        th { background-color: #eee; min-width: 50px; }

        /* 2. EKSTREMNO USKA KOLONA ZA OPCIJE (Horizontalne tačkice) */
        .col-id { width: 40px; font-weight: bold; background: #eee; resize: none; }
        .col-opc { width: 30px; color: #888; cursor: pointer; font-size: 12px; resize: none; }

        /* 3. TAČKICE U ZAGLAVLJU (A, B, C...) */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }
        .h-dots { font-size: 12px; color: #999; cursor: pointer; margin-left: 5px; }

        input { 
            width: 100%; 
            height: 100%; 
            border: none; 
            outline: none; 
            background: transparent; 
            text-align: center; 
        }

        /* Dodatak za resize dršku da bude vidljivija */
        th::-webkit-resizer, td::-webkit-resizer {
            border: 4px solid transparent;
            border-right-color: #ccc;
            border-bottom-color: #ccc;
        }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" onclick="addRow()">+ NOVI RED</button>
    <button class="btn" onclick="addColumn()">+ NOVA KOLONA</button>
    <div class="title">INŽINJER</div>
</div>

<table id="myTable">
    <thead>
        <tr id="header-row">
            <th class="col-id">ID</th>
            <th class="col-opc">...</th>
            <th style="width: 150px;">
                <div class="header-container"><span>A</span><span class="h-dots">...</span></div>
            </th>
            <th style="width: 150px;">
                <div class="header-container"><span>B</span><span class="h-dots">...</span></div>
            </th>
            <th style="width: 150px;">
                <div class="header-container"><span>C</span><span class="h-dots">...</span></div>
            </th>
        </tr>
    </thead>
    <tbody id="table-body">
        </tbody>
</table>

<script>
    let rowCount = 10; // Možeš staviti 171 ili koliko želiš
    let colCount = 3; 
    const colLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

    function renderTable() {
        const tbody = document.getElementById('table-body');
        tbody.innerHTML = '';

        for (let i = 1; i <= rowCount; i++) {
            const tr = document.createElement('tr');
            
            // ID i horizontalne tačkice
            let html = `<td class="col-id">${i}</td><td class="col-opc">...</td>`;
            
            // Kolone sa inputima
            for (let j = 0; j < colCount; j++) {
                html += `<td><input type="text"></td>`;
            }
            
            tr.innerHTML = html;
            tbody.appendChild(tr);
        }
    }

    function addRow() { rowCount++; renderTable(); }
    
    function addColumn() {
        if(colCount < colLetters.length) {
            const headerRow = document.getElementById('header-row');
            const th = document.createElement('th');
            th.style.width = "150px";
            th.innerHTML = `<div class="header-container"><span>${colLetters[colCount]}</span><span class="h-dots">...</span></div>`;
            headerRow.appendChild(th);
            colCount++;
            renderTable();
        }
    }

    renderTable();
</script>

</body>
</html>
