<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <title>Inžinjerski Excel ULTRA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: sans-serif; margin: 0; background: #f0f0f0; overflow: hidden; }
        .toolbar { background: #217346; color: white; padding: 10px; display: flex; gap: 10px; position: sticky; top: 0; z-index: 1000; align-items: center; }
        button { padding: 8px 15px; border: 0; border-radius: 4px; background: white; color: #217346; font-weight: bold; cursor: pointer; }
        button:hover { background: #e8f5e9; }
        #table-container { height: calc(100vh - 60px); overflow: auto; padding: 10px; }
        table { border-collapse: collapse; background: white; table-layout: fixed; width: max-content; }
        td, th { border: 1px solid #ccc; width: 130px; height: 35px; text-align: center; outline: none; font-size: 16px; position: relative; }
        th, .row-idx { background: #e2e2e2; user-select: none; font-weight: bold; }
        th { position: sticky; top: 0; z-index: 10; }
        .row-idx { position: sticky; left: 0; z-index: 5; width: 50px; }
        .active-cell { border: 2px solid #217346 !important; background: #fffde7 !important; z-index: 20; }
        
        /* NOVI KONTEKSTUALNI MENI */
        #ctx-menu {
            position: fixed; display: none; background: white; border: 1px solid #aaa;
            box-shadow: 3px 3px 10px rgba(0,0,0,0.2); z-index: 10000; width: 180px; border-radius: 3px;
        }
        .ctx-item { padding: 10px 15px; cursor: pointer; font-size: 14px; color: #333; }
        .ctx-item:hover { background: #217346; color: white; }
    </style>
</head>
<body onclick="hideCtx()">

<div class="toolbar">
    <button onclick="addRow()">+ Dodaj Red</button>
    <button onclick="addCol()">+ Dodaj Kolonu</button>
    <div style="flex-grow: 1;"></div>
    <button onclick="exportExcel()" style="background: #1d6f42; color: white;">💾 SNIMI EXCEL (.xlsx)</button>
    <button onclick="savePDF()" style="background: #d32f2f; color: white;">📄 SNIMI PDF</button>
</div>

<div id="ctx-menu">
    <div class="ctx-item" onclick="addRow()">Ubaci red ispod</div>
    <div class="ctx-item" onclick="deleteRow()">Obriši ovaj red</div>
    <div class="ctx-item" onclick="clearCell()">Očisti ćeliju</div>
</div>

<div id="table-container">
    <table id="excelTable">
        <thead><tr id="header"></tr></thead>
        <tbody id="body"></tbody>
    </table>
</div>

<script>
let rows = 100, cols = 15;
let dataStore = {};
let currentCell = null;

function build() {
    const h = document.getElementById("header");
    const b = document.getElementById("body");
    h.innerHTML = '<th class="row-idx">ID</th>';
    for(let j=0; j<cols; j++) {
        let th = document.createElement("th");
        th.innerText = String.fromCharCode(65 + j);
        h.appendChild(th);
    }
    b.innerHTML = "";
    for(let i=1; i<=rows; i++) {
        let tr = document.createElement("tr");
        let idxTd = document.createElement("td");
        idxTd.className = "row-idx";
        idxTd.innerText = i;
        tr.appendChild(idxTd);

        for(let j=0; j<cols; j++) {
            let id = String.fromCharCode(65 + j) + i;
            let td = document.createElement("td");
            td.contentEditable = true;
            td.id = id;

            // Forsiranje našeg desnog klika
            td.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                e.stopPropagation();
                showCtx(e.clientX, e.clientY, td);
                return false;
            }, {capture: true});

            td.onfocus = () => { td.classList.add("active-cell"); };
            td.onblur = () => { td.classList.remove("active-cell"); dataStore[id] = td.innerText; };

            // Navigacija strelicama
            td.onkeydown = (e) => {
                let r = tr.rowIndex - 1, c = td.cellIndex;
                if (e.key === "ArrowUp") { e.preventDefault(); moveFocus(r - 1, c); }
                else if (e.key === "ArrowDown") { e.preventDefault(); moveFocus(r + 1, c); }
                else if (e.key === "ArrowLeft" && window.getSelection().anchorOffset === 0) { e.preventDefault(); moveFocus(r, c - 1); }
                else if (e.key === "ArrowRight" && window.getSelection().anchorOffset === td.innerText.length) { e.preventDefault(); moveFocus(r, c + 1); }
                else if (e.key === "Enter") { e.preventDefault(); td.blur(); moveFocus(r + 1, c); }
            };
            tr.appendChild(td);
        }
        b.appendChild(tr);
    }
}

function showCtx(x, y, cell) {
    let m = document.getElementById("ctx-menu");
    m.style.display = "block";
    m.style.left = x + "px";
    m.style.top = y + "px";
    currentCell = cell;
}

function hideCtx() { document.getElementById("ctx-menu").style.display = "none"; }

function moveFocus(r, c) {
    let table = document.getElementById("excelTable");
    if (r >= 0 && r < rows && c >= 1 && c <= cols) table.rows[r+1].cells[c].focus();
}

function deleteRow() { if(currentCell) currentCell.parentElement.remove(); hideCtx(); }
function clearCell() { if(currentCell) currentCell.innerText = ""; hideCtx(); }

// FUNKCIJE ZA SNIMANJE
function exportExcel() {
    let table = document.getElementById("excelTable");
    let wb = XLSX.utils.table_to_book(table);
    XLSX.writeFile(wb, "Proracun_Izvoz.xlsx");
}

function savePDF() {
    const element = document.getElementById('table-container');
    const opt = {
        margin: 5,
        filename: 'Proracun.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
    };
    html2pdf().set(opt).from(element).save();
}

function addRow() { rows++; build(); }
function addCol() { cols++; build(); }

build();
</script>
</body>
</html>
