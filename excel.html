<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inžinjer - Tabela</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f4f4; }
        
        /* Toolbar */
        .toolbar {
            background-color: #444;
            color: white;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .btn {
            background: none;
            border: 2px solid white;
            color: white;
            padding: 8px 15px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .title { margin-left: auto; font-size: 24px; font-weight: bold; }

        /* Tabela */
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
        
        /* 1. SMANJENA OPC KOLONA */
        .col-id { width: 40px; background: #eee; font-weight: bold; }
        .col-opc { width: 30px; color: #888; cursor: pointer; font-weight: bold; }

        /* 2. STIL ZA TAČKICE U KOLONAMA A, B, C... */
        .th-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }
        .dots { color: #888; cursor: pointer; font-size: 14px; }

        th { background-color: #eee; }
        input { width: 95%; border: none; outline: none; background: transparent; text-align: center; }
    </style>
</head>
<body>

<div class="toolbar">
    <button class="btn" onclick="addRow()">+ NOVI RED</button>
    <button class="btn" onclick="addColumn()">+ NOVA KOLONA</button>
    <div class="title">INŽINJER</div>
</div>

<table>
    <thead>
        <tr id="header-row">
            <th class="col-id">ID</th>
            <th class="col-opc">⋮</th> </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
</table>

<script>
    let rowCount = 4;
    let colCount = 4;
    const colLetters = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'J'];

    function renderTable() {
        const headerRow = document.getElementById('header-row');
        const tbody = document.getElementById('table-body');

        // Render zaglavlja (A, B, C...) sa tačkicama
        headerRow.innerHTML = '<th class="col-id">ID</th><th class="col-opc">⋮</th>';
        for (let i = 0; i < colCount; i++) {
            const th = document.createElement('th');
            th.innerHTML = `
                <div class="th-content">
                    <span>${colLetters[i]}</span>
                    <span class="dots">⋮</span>
                </div>`;
            headerRow.appendChild(th);
        }

        // Render redova
        tbody.innerHTML = '';
        for (let i = 1; i <= rowCount; i++) {
            const tr = document.createElement('tr');
            
            // ID i OPC ćelije
            tr.innerHTML = `<td class="col-id">${i}</td><td class="col-opc">⋮</td>`;
            
            // Input polja
            for (let j = 0; j < colCount; j++) {
                const td = document.createElement('td');
                td.innerHTML = '<input type="text" />';
                tr.appendChild(td);
            }
            tbody.appendChild(tr);
        }
    }

    function addRow() { rowCount++; renderTable(); }
    function addColumn() { if(colCount < colLetters.length) { colCount++; renderTable(); } }

    renderTable();
</script>

</body>
</html>
