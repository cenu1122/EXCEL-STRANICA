<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Pisala PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            background-color: #525659;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            font-family: 'Times New Roman', serif;
        }

        /* TRAKA SA ALATIMA KOJA TI NEDOSTAJE */
        .toolbar {
            position: sticky;
            top: 0;
            background: #ffffff;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 1000;
            border-bottom: 3px solid #2b579a;
        }

        .group {
            display: flex;
            gap: 8px;
            border-right: 2px solid #ddd;
            padding-right: 15px;
        }

        button, select {
            padding: 10px 15px;
            cursor: pointer;
            border: 1px solid #ccc;
            background: #f8f9fa;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px; /* Veće za TV */
        }

        button:hover {
            background: #e2e6ea;
            border-color: #2b579a;
        }

        .btn-pdf {
            background-color: #2b579a;
            color: white;
            border: none;
        }

        /* PAPIR */
        #editor-container {
            padding: 40px 0;
        }

        #document-page {
            background-color: white;
            width: 210mm;
            min-height: 297mm;
            padding: 25mm;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            outline: none;
            font-size: 18px;
            line-height: 1.6;
            color: black;
            box-sizing: border-box;
            text-align: left;
        }

        @media screen and (max-width: 850px) {
            #document-page { width: 95vw; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <div class="group">
            <button onclick="execCmd('bold')">B</button>
            <button onclick="execCmd('italic')">I</button>
            <button onclick="execCmd('underline')">U</button>
        </div>

        <div class="group">
            <button onclick="execCmd('justifyLeft')">Lijevo</button>
            <button onclick="execCmd('justifyCenter')">Centar</button>
            <button onclick="execCmd('justifyFull')">OBOSTRANO (Justify)</button>
        </div>

        <div class="group">
            <select onchange="execCmd('fontSize', this.value)">
                <option value="3">Veličina</option>
                <option value="4">Naslov 3</option>
                <option value="5">Naslov 2</option>
                <option value="6">Naslov 1</option>
            </select>
        </div>

        <button class="btn-pdf" onclick="downloadPDF()">SAČUVAJ KAO PDF</button>
    </div>

    <div id="editor-container">
        <div id="document-page" contenteditable="true">
            Sada ćeš ovdje vidjeti sve opcije iznad...
        </div>
    </div>

    <script>
        function execCmd(command, value = null) {
            document.execCommand(command, false, value);
        }

        function downloadPDF() {
            const element = document.getElementById('document-page');
            const opt = {
                margin:       10,
                filename:     'moj_dokument.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };
            html2pdf().set(opt).from(element).save();
        }
    </script>

</body>
</html>
