<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj TV Panel</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            display: flex;
            gap: 20px;
        }
        .btn {
            width: 250px;
            padding: 40px;
            text-align: center;
            text-decoration: none;
            color: white;
            font-size: 24px;
            font-weight: bold;
            border-radius: 15px;
            transition: 0.3s;
        }
        .word { background-color: #2b579a; border: 4px solid #1e3e6d; }
        .excel { background-color: #217346; border: 4px solid #164d2f; }
        .btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        h1 { margin-bottom: 50px; font-size: 32px; }
    </style>
</head>
<body>

    <h1>IZABERITE ALAT</h1>

    <div class="container">
        <a href="word.html" class="btn word">OTVORI WORD</a>
        <a href="excel.html" class="btn excel">OTVORI EXCEL</a>
    </div>

</body>
</html>
