<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moj TV Radni Prostor</title>
    <style>
        body {
            background-color: #1a1a1a; /* Tamna pozadina, ugodnija za TV */
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            margin-bottom: 50px;
            font-size: 3rem;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .menu-container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-card {
            width: 300px;
            height: 200px;
            background: #2b579a; /* Word plava */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 4px solid transparent;
        }

        .menu-card.excel {
            background: #217346; /* Excel zelena */
        }

        .menu-card:hover, .menu-card:focus {
            transform: scale(1.1);
            border-color: white;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            outline: none;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 10px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: bold;
        }

        .desc {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <h1>RADNI PROSTOR</h1>

    <div class="menu-container">
        <a href="word.html" class="menu-card">
            <div class="icon">📝</div>
            <div class="title">WORD</div>
            <div class="desc">Dokumenti i slike</div>
        </a>

        <a href="excel.html" class="menu-card excel">
            <div class="icon">📊</div>
            <div class="title">EXCEL</div>
            <div class="desc">Tabele i proračuni</div>
        </a>
    </div>

    <p style="margin-top: 50px; color: #666;">Prilagođeno za Android TV</p>

</body>
</html>
