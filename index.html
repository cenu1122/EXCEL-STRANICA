<!DOCTYPE html>
<html lang="bs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Pisala</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body {
            background-color: #525659; /* Siva pozadina kao u Wordu */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            font-family: Arial, sans-serif;
            margin: 0;
        }
        .toolbar {
            position: sticky;
            top: 0;
            background: #f8f9fa;
            padding: 10px;
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 100;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        #document-page {
            background-color: white;
            width: 210mm; /* A4 širina */
            min-height: 297mm; /* A4 visina */
            padding: 25mm; /* Standardne margine */
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
            outline: none;
            font-size: 18px;
            line-height: 1.5;
            color: black;
            box-sizing: border-box;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
            background-color: #2b579a; /* Word plava boja */
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
        }
        button:hover {
            background-color: #1e3e6d;
        }
        @media screen and (max-width: 850px) {
            #document-page {
                width: 95vw;
                padding: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="toolbar">
        <button onclick="downloadPDF()">SAČUVAJ KAO PDF</button>
        <span style="color: #666; font-size: 14px;">Klikni na papir i počni pisati...</span>
    </div>

    <div id="document-page" contenteditable="true">
        Počnite kucati ovdje...
    </div>

    <script>
        function downloadPDF() {
            const element = document.getElementById('document-page');
            const opt = {
                margin:       0,
                filename:     'moj_dokument.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2 },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            // Pokreni pretvaranje u PDF
            html2pdf().set(opt).from(element).save();
        }
    </script>

</body>
</html>
